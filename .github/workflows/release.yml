name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.suffix }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            suffix: darwin-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install tmux (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir omar-${{ matrix.suffix }}
          cp target/${{ matrix.target }}/release/omar \
             target/${{ matrix.target }}/release/omar-slack \
             target/${{ matrix.target }}/release/omar-computer \
             omar-${{ matrix.suffix }}/
          tar czf omar-${{ matrix.suffix }}.tar.gz omar-${{ matrix.suffix }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omar-${{ matrix.suffix }}
          path: omar-${{ matrix.suffix }}.tar.gz

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          cd $GITHUB_WORKSPACE
          sha256sum omar-*/omar-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --generate-notes \
            omar-*/omar-*.tar.gz checksums.txt
